<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMÓVEIS — Família Guerra Holding</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6F6F3;--bg-card:#FFFFFF;--bg-hover:#F0F1EE;--bg-section:#F1F2EE;--bg-sub:#F4F5F1;
  --border:#E1E2DC;--border-lite:#EAEBE6;
  --gold:#2F6F5E;--gold-lt:#255A4C;--gold-dim:#BFDFD5;--gold-bg:#EAF5F1;
  --text:#1B1D1B;--muted:#5C5E58;--dim:#94958E;
  --green:#1D8348;--red:#C0392B;--blue:#1F6B85;--amber:#B4740E;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{display:flex;min-height:100vh}
.sidebar{width:230px;min-width:230px;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;box-shadow:1px 0 3px rgba(20,20,20,.03)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:56px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;position:sticky;top:0;z-index:50}
.content{flex:1;padding:28px 24px 80px;overflow-y:auto}
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sb-logo-eye{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.sb-logo-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text);line-height:1.1}
.sb-logo-sub{font-size:10px;color:var(--dim);margin-top:2px}
.sb-section{padding:12px 18px 4px;font-size:9px;font-weight:700;letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:6px;cursor:pointer;transition:all .15s;color:var(--muted);font-size:12px;font-weight:500;border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:'DM Sans',sans-serif}
.sb-item:hover{background:var(--bg-hover);color:var(--text)}
.sb-item.active{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-dim)}
.sb-bottom{margin-top:auto;padding:14px 10px;border-top:1px solid var(--border)}
.imovel-sel{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;outline:none;cursor:pointer}
.imovel-sel:focus{border-color:var(--gold)}
.tb-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);letter-spacing:.04em;flex:1}
.tb-period{display:flex;align-items:center;gap:8px}
.tb-sel{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 9px;outline:none;cursor:pointer}
.tb-sel:focus{border-color:var(--gold)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;border-radius:5px;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{background:var(--gold);color:#fff;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:6px;padding:9px 18px;cursor:pointer;transition:background .15s}
.btn-gold:hover{background:var(--gold-lt)}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
.btn-sm:hover{border-color:var(--red);color:var(--red)}
.btn-ok{border-color:transparent;color:var(--muted)}
.btn-ok:hover{border-color:var(--green);color:var(--green)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:28px}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s;box-shadow:0 1px 3px rgba(20,20,20,.05)}
.kpi:hover{border-color:var(--gold-dim)}
.kpi-accent{position:absolute;top:0;left:0;right:0;height:2px}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:5px}
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sec-hdr h2{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-note{font-size:11px;color:var(--dim);margin:-8px 0 16px;line-height:1.6}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;margin-bottom:24px;background:var(--bg-card);box-shadow:0 1px 3px rgba(20,20,20,.04)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg-section);padding:9px 14px;text-align:right;font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}
td{padding:8px 14px;border-bottom:1px solid var(--border-lite);vertical-align:middle;font-variant-numeric:tabular-nums}
td:not(:first-child){text-align:right}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-hover)}
.tfoot td{background:var(--bg-sub);border-top:1px solid var(--border);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;border-bottom:none}
.tfoot td:first-child{text-align:left}
.pos{color:var(--green)}.neg{color:var(--red)}.gold{color:var(--gold)}.dim{color:var(--dim)}
.form-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:22px;box-shadow:0 1px 3px rgba(20,20,20,.04)}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:14px}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--dim)}
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;white-space:nowrap}
.b-ok{background:#E7F5EC;color:var(--green);border:1px solid #BFE3CC}
.b-pend{background:#FCF1DD;color:var(--amber);border:1px solid #F0D9A6}
.b-late{background:#FAE7E4;color:var(--red);border:1px solid #EFC3BC}
.b-info{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-dim)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;gap:0}
.tab-btn{padding:9px 18px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover:not(.active){color:var(--text)}
.dre-row{display:flex;border-bottom:1px solid var(--border-lite)}
.dre-l{flex:1;padding:10px 16px;display:flex;align-items:center;font-size:13px}
.dre-v{width:180px;min-width:180px;display:flex;align-items:center;justify-content:flex-end;padding:10px 16px;font-size:13px;font-variant-numeric:tabular-nums}
.dre-hdr{background:var(--bg-section);border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-top:8px}
.dre-hdr:first-child{margin-top:0}
.dre-hdr .dre-l{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
.dre-hdr .dre-l::before{content:'';width:3px;height:13px;background:var(--gold);border-radius:2px;flex-shrink:0;margin-right:10px}
.dre-sub{background:var(--bg-sub);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.dre-sub .dre-l{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.empty{display:flex;flex-direction:column;align-items:center;padding:50px 20px;color:var(--dim);gap:10px;text-align:center;font-size:13px}
.file-drop{border:1px dashed var(--border);border-radius:8px;padding:14px;font-size:12px;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
.file-drop:hover{border-color:var(--gold);color:var(--gold)}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg-sub);border:1px solid var(--border);border-radius:5px;padding:4px 9px;font-size:11px;color:var(--text)}
.file-chip a{color:var(--gold);text-decoration:none}
#notif{position:fixed;top:18px;right:18px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.ni{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:11px 15px;font-size:12px;display:flex;align-items:center;gap:8px;min-width:240px;pointer-events:all;animation:sli .2s ease}
.ni.ok{border-left:3px solid var(--green)}.ni.err{border-left:3px solid var(--red)}.ni.info{border-left:3px solid var(--gold)}
@keyframes sli{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-bg{position:fixed;inset:0;background:rgba(20,22,20,.55);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg-card);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:12px;padding:32px;width:440px;max-width:92vw;max-height:86vh;overflow-y:auto;box-shadow:0 8px 30px rgba(20,20,20,.18)}
.modal h2{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:6px}
.modal p{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6}
@media(max-width:768px){.sidebar{display:none}.content{padding:14px 12px 80px}.kpi-grid{grid-template-columns:1fr 1fr}}
@media print{.sidebar,.topbar{display:none!important}.content{padding:0}body{background:#fff;color:#000}}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<body>
<div id="notif"></div>

<div id="app">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-eye">Família Guerra Holding</div>
      <div class="sb-logo-name">IMÓVEIS</div>
      <div class="sb-logo-sub">Gestão de Locações</div>
    </div>
    <div class="sb-section">Visão Geral</div>
    <button class="sb-item active" data-tab="dashboard" onclick="setTab('dashboard',this)">📊 Dashboard</button>
    <div class="sb-section">Lançamentos</div>
    <button class="sb-item" data-tab="alugueis" onclick="setTab('alugueis',this)">🏠 Aluguéis</button>
    <button class="sb-item" data-tab="repasses" onclick="setTab('repasses',this)">📄 IPTU / Água (Corretor)</button>
    <button class="sb-item" data-tab="despesas" onclick="setTab('despesas',this)">📉 Despesas Diretas</button>
    <button class="sb-item" data-tab="condominio" onclick="setTab('condominio',this)">🔁 Condomínio Adiantado</button>
    <button class="sb-item" data-tab="rateio" onclick="setTab('rateio',this)">➗ Contas Rateadas</button>
    <div class="sb-section">Gestão</div>
    <button class="sb-item" data-tab="imoveis" onclick="setTab('imoveis',this)">🏢 Cadastro de Imóveis</button>

      <button class="sb-item" onclick="syncManual()" style="width:100%;margin:0;color:var(--gold)">☁ Sincronizar</button>

    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<div id="login-screen" style="display:none">
  <div style="width:340px;background:var(--bg-card);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:12px;padding:40px 32px 32px">
    <div style="font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:6px">Família Guerra Holding</div>
    <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:4px">IMÓVEIS</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:28px">Gestão de Locações</div>
    <div class="fl" style="margin-bottom:12px"><label>Usuário</label><input class="fi" type="text" id="l-user" placeholder="usuário" autocomplete="username"></div>
    <div class="fl" style="margin-bottom:18px"><label>Senha</label><input class="fi" type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <div id="l-err" style="font-size:12px;color:var(--red);margin-bottom:10px;display:none">Usuário ou senha incorretos.</div>
    <button class="btn-gold" style="width:100%" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="modal-root"></div>

<script>
// ── LOGIN — mesmas credenciais do sistema Mr. Capas ──
const CREDS={u:'Guerra',p:'Resiliencia2023@'};
const CREDS_EXTRA=[
  {u:'TERRA',p:'110205',nome:'Terra'},
  {u:'PAIVA',p:'913700',nome:'Paiva'},
];
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const NOW=new Date();
const ST={tab:'dashboard',mes:NOW.getMonth()+1,ano:NOW.getFullYear()};
const BRL=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const fmt=n=>BRL.format(n||0);
const vc=n=>n>0?'pos':n<0?'neg':'dim';
const uuid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
const pad2=n=>String(n).padStart(2,'0');

function notify(msg,type){
  const box=document.getElementById('notif');
  const el=document.createElement('div');
  el.className='ni '+(type||'info');
  el.textContent=msg;
  box.appendChild(el);
  setTimeout(()=>el.remove(),3200);
}

// ── PERSISTÊNCIA LOCAL + CHAVES ──
function pk(t){return `imoveisfg_${t}`}
function pkPeriodo(t){return `imoveisfg_${t}_${ST.ano}_${pad2(ST.mes)}`}
function load(k){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(e){return []}}
function save(k,d){localStorage.setItem(k,JSON.stringify(d));pushToFB();}

// ── FIREBASE — mesmo projeto, caminho separado do Mr. Capas ──
firebase.initializeApp({
  apiKey:'AIzaSyBdp0xbPdybkjI8D-mp-_uI57qUHxhDXvg',
  databaseURL:'https://grupofamiliaguerra-9d13e-default-rtdb.firebaseio.com',
  projectId:'grupofamiliaguerra-9d13e'
});
const _db=firebase.database();
const _dbRef=_db.ref('imoveisfg');
let _syncTimer=null,_pushInProgress=false;

function setSyncStatus(msg,cor){
  const el=document.getElementById('sync-status');
  if(el){el.textContent=msg;el.style.color=cor||'var(--muted)';}
}
function _coletaDados(){
  const d={_ts:Date.now()};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k && k.startsWith('imoveisfg_')){
      try{d[k]=JSON.parse(localStorage.getItem(k));}catch(e){d[k]=localStorage.getItem(k);}
    }
  }
  return d;
}
function pushToFB(){
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(()=>{
    setSyncStatus('⟳ Salvando...','var(--amber)');
    _dbRef.set(_coletaDados()).then(()=>{
      setSyncStatus('✓ Salvo','var(--green)');
      setTimeout(()=>setSyncStatus('• Online','var(--green)'),2000);
    }).catch(e=>{
      setSyncStatus('⚠ '+e.message,'var(--red)');
      notify('Erro ao salvar: '+e.message,'err');
    });
  },250);
}
function aplicarDados(rec){
  if(!rec||typeof rec!=='object')return;
  Object.entries(rec).forEach(([k,v])=>{
    if(k && k.startsWith('imoveisfg_')) localStorage.setItem(k,JSON.stringify(v));
  });
}
function syncFromFB(){
  setSyncStatus('⟳ Carregando...','var(--amber)');
  return _dbRef.once('value').then(snap=>{
    const rec=snap.val();
    if(rec){aplicarDados(rec);setSyncStatus('✓ Sincronizado','var(--green)');}
    else setSyncStatus('• Online (vazio)','var(--green)');
    setTimeout(()=>setSyncStatus('• Online','var(--green)'),2500);
  }).catch(e=>{setSyncStatus('• Local','var(--dim)');});
}
function syncManual(){
  setSyncStatus('⟳ Sincronizando...','var(--amber)');
  syncFromFB().then(()=>{pushToFB();render();notify('✓ Sincronizado!','ok');});
}

// ── LOGIN ──
function doLogin(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  const extra=CREDS_EXTRA.find(c=>c.u===u && c.p===p);
  if((u===CREDS.u && p===CREDS.p) || extra){
    sessionStorage.setItem('imoveisfg_auth','1');
    document.getElementById('login-screen').style.display='none';
    initApp();
  } else {
    document.getElementById('l-err').style.display='block';
  }
}
function doLogout(){
  sessionStorage.removeItem('imoveisfg_auth');
  document.getElementById('login-screen').style.display='flex';
}
document.getElementById('l-pass')?.addEventListener?.('keydown',e=>{if(e.key==='Enter')doLogin();});

// ── UPLOAD DE COMPROVANTE (base64, renomeado automaticamente) ──
// Padrão de nome: IMOVEL_TIPOCONTA_MESANO.ext
function slug(s){return (s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9]+/g,'').slice(0,20)||'ARQ'}
function nomeAutomatico(imovelNome,tipoConta){
  const ext='pdf';
  return `${slug(imovelNome)}_${slug(tipoConta)}_${pad2(ST.mes)}${ST.ano}`;
}
function lerArquivo(inputEl,cbNomeBase,onDone){
  const f=inputEl.files[0];
  if(!f){onDone(null);return;}
  if(f.size>4*1024*1024){notify('Arquivo maior que 4MB — reduza o tamanho do PDF/foto.','err');onDone(null);return;}
  const reader=new FileReader();
  reader.onload=()=>{
    const ext=(f.name.split('.').pop()||'pdf').toLowerCase();
    const nomeFinal=`${cbNomeBase()}.${ext}`;
    onDone({nomeOriginal:f.name,nomeFinal,mime:f.type,data:reader.result,tamanho:f.size});
  };
  reader.readAsDataURL(f);
}
function comprovanteChip(comp){
  if(!comp) return `<span class="dim" style="font-size:11px">sem comprovante</span>`;
  return `<span class="file-chip">📎 <a href="#" onclick="event.preventDefault();abrirComprovante('${comp.id||''}',this)" data-file='${JSON.stringify(comp).replace(/'/g,'&apos;')}'>${comp.nomeFinal}</a> <a href="${comp.data}" download="${comp.nomeFinal}" title="baixar" style="color:var(--dim);text-decoration:none">⬇</a></span>`;
}
function abrirComprovante(_id,el){
  const comp=JSON.parse(el.getAttribute('data-file').replace(/&apos;/g,"'"));
  const w=window.open('');
  if(comp.mime && comp.mime.startsWith('image/')){

// ── IMPORTAÇÃO DE RELATÓRIO PDF (Aprisco/Alude) ──
if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}
function parseBRNum(s){
  if(!s)return 0;
  return parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0;
}
function normTxt(s){return (s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function parseRelatorioAlude(text){
  const g=(re)=>{const m=text.match(re);return m?m[1].trim():null};
  const valorRepassado=parseBRNum(g(/Valor repassado[\s\S]{0,40}?R\$\s?([\d.,]+)/));
  const dataRepasse=g(/(\d{2}\/\d{2}\/\d{4})\s*(?:às|as)/);
  const referente=g(/Referente a\s+([A-Za-zçÇéÉ]+\/\d{4})/);
  const imovelAddr=g(/Im[oó]vel\s+([\s\S]+?)\s+Locat[aá]rio/);
  const locatario=g(/Locat[aá]rio\s+([^\n(]+?)\s*\(/);
  const imobiliaria=g(/Imobili[aá]ria\s+([^\n(]+?)\s*\(/);
  const cobradoSection=(text.split(/O QUE FOI COBRADO/)[1]||'').split(/O QUE FOI TRANSFERIDO/)[0];
  const transferSection=text.split(/O QUE FOI TRANSFERIDO/)[1]||'';
  const alugCobrado=parseBRNum((cobradoSection.match(/Aluguel\s*(?:\([^)]*\))?\s*R\$\s?([\d.,]+)/)||[])[1]);
  const iptuCobrado=parseBRNum((cobradoSection.match(/IPTU\s+R\$\s?([\d.,]+)/)||[])[1]);
  const alugTransf=parseBRNum((transferSection.match(/Aluguel\s+R\$\s?([\d.,]+)/)||[])[1]);
  const iptuTransf=parseBRNum((transferSection.match(/IPTU\s+R\$\s?([\d.,]+)/)||[])[1]);
  // Juros e multa por atraso — podem aparecer cobrados e/ou repassados ao proprietário
  const jurosCobrado=parseBRNum((cobradoSection.match(/(?:Juros|Multa)[^\n\d]*R\$\s?([\d.,]+)/)||[])[1]);
  const jurosTransf=parseBRNum((transferSection.match(/(?:Juros|Multa)[^\n\d]*R\$\s?([\d.,]+)/)||[])[1]);
  // Taxa de manutenção/administração cobrada do inquilino mas retida pela imobiliária (não repassada ao proprietário)
  const taxaManutCobrado=parseBRNum((cobradoSection.match(/Taxa de manuten[cç][aã]o[^\n\d]*R\$\s?([\d.,]+)/i)||[])[1]);
  return {valorRepassado,dataRepasse,referente,imovelAddr,locatario,imobiliaria,alugCobrado,iptuCobrado,alugTransf,iptuTransf,jurosCobrado,jurosTransf,taxaManutCobrado};
}
function matchImovel(addr){
  if(!addr)return null;
  const na=normTxt(addr).replace(/[^A-Z0-9]+/g,' ').trim();
  const ims=getImoveis();
  // 1) match exato/quase exato pelo campo Endereço (o mais confiável — é o texto cru do relatório)
  const exato=ims.find(im=>im.endereco && normTxt(im.endereco).replace(/[^A-Z0-9]+/g,' ').trim()===na);
  if(exato)return exato;
  // 2) match por maioria das palavras do endereço (caso o endereço cadastrado esteja levemente diferente)
  const palavrasAddr=na.split(' ').filter(w=>w.length>2);
  let best=null,bestScore=0;
  ims.forEach(im=>{
    if(!im.endereco)return;
    const alvo=normTxt(im.endereco).replace(/[^A-Z0-9]+/g,' ');
    const score=palavrasAddr.filter(w=>alvo.includes(w)).length/palavrasAddr.length;
    if(score>bestScore){bestScore=score;best=im;}
  });
  if(best && bestScore>=0.7)return best;
  // 3) fallback: nome + endereço combinados, contagem simples de palavras em comum
  best=null;bestScore=0;
  ims.forEach(im=>{
    const alvo=normTxt(im.nome+' '+(im.endereco||''));
    const score=palavrasAddr.filter(w=>alvo.includes(w)).length;
    if(score>bestScore){bestScore=score;best=im;}
  });
  return bestScore>0?best:null;
}
let _pdfPendingFile=null;
function ddmmyyyy2iso(d){
  if(!d)return today();
  const [dd,mm,yy]=d.split('/');
  return `${yy}-${mm}-${dd}`;
}
function handlePDFFile(input){
  const f=input.files[0];
  if(!f)return;
  document.getElementById('pdf-import-status').textContent='⟳ Lendo PDF...';
  const readerBin=new FileReader();
  readerBin.onload=async()=>{
    try{
      const typedarray=new Uint8Array(readerBin.result);
      const pdf=await pdfjsLib.getDocument({data:typedarray}).promise;
      let fullText='';
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p);
        const tc=await page.getTextContent();
        fullText+=tc.items.map(it=>it.str).join(' ')+' ';
      }
      const parsed=parseRelatorioAlude(fullText);
      const readerB64=new FileReader();
      readerB64.onload=()=>{
        _pdfPendingFile={nomeOriginal:f.name,mime:f.type,data:readerB64.result,tamanho:f.size};
        abrirPreviewImportPDF(parsed);
        document.getElementById('pdf-import-status').textContent='✓ PDF lido — confira os dados abaixo antes de lançar.';
      };
      readerB64.readAsDataURL(f);
    }catch(e){
      console.error(e);
      document.getElementById('pdf-import-status').textContent='⚠ Não consegui ler este PDF automaticamente. Lance manualmente abaixo.';
    }
  };
  readerBin.readAsArrayBuffer(f);
}

      ${p.iptuTransf?`<div class="sec-note" style="margin:0 0 12px">Este relatório mostra <strong>${fmt(p.iptuTransf)}</strong> de IPTU que a imobiliária repassou pra você (não descontou). Esse valor caiu na sua conta, mas não é seu — o IPTU ainda precisa ser pago. Por isso ele <strong>não</strong> entra no campo "Valor Líquido Aluguel" acima; vou registrar separado, como pendente, na aba IPTU/Água.</div>`:''}

function addRepasse(){
  const imovelId=document.getElementById('rp-im').value;
  if(!imovelId){notify('Cadastre e selecione um imóvel','err');return;}
  const tipo=document.getElementById('rp-tipo').value;

  const fBoleto=document.getElementById('rp-file-boleto');
  const fComp=document.getElementById('rp-file-comp');
  lerArquivo(fBoleto,()=>nomeAutomatico(imovelNome(imovelId),tipo+'-BOLETO'),(boleto)=>{
    base.boleto=boleto;
    lerArquivo(fComp,()=>nomeAutomatico(imovelNome(imovelId),tipo+'-COMPROVANTE'),(comp)=>{
      base.comprovantePagamento=comp;
      const lst=load(pkPeriodo('repasses'));

function limparRelatoriosAntigos(){
  if(!confirm('Remover os relatórios anexados automaticamente por engano (de antes da correção) em todos os meses? O lançamento em si não será excluído, só o anexo do relatório.'))return;
  let count=0;
  Object.keys(localStorage).filter(k=>k.startsWith('imoveisfg_repasses_')).forEach(k=>{
    const arr=load(k);
    let mudou=false;
    arr.forEach(r=>{if(r.relatorioOrigem){delete r.relatorioOrigem;mudou=true;count++;}});
    if(mudou)localStorage.setItem(k,JSON.stringify(arr));
  });
  pushToFB();
  notify(`${count} relatório(s) removido(s)`,'ok');render();
}

// ── CONTAS RATEADAS (ex: água única para vários imóveis) ──
function calcularCotasAjustadas(valor,partes){
  const brutos=partes.map(p=>Math.round(valor*p.pct)/100);
  const somaArred=brutos.reduce((s,v)=>s+v,0);
  const diff=Math.round((valor-somaArred)*100)/100;
  const cotas=partes.map((p,i)=>({imovelId:p.imovelId,pct:p.pct,cota:brutos[i]}));
  if(diff!==0 && cotas.length) cotas[cotas.length-1].cota=Math.round((cotas[cotas.length-1].cota+diff)*100)/100;
  return cotas;
}

function addRateioRegra(){
  const nome=document.getElementById('rt-nome').value.trim();
  if(!nome){notify('Dê um nome para a conta mestre','err');return;}
  const partes=[...document.querySelectorAll('.rt-pct')].map(inp=>({imovelId:inp.dataset.imovel,pct:+inp.value||0})).filter(p=>p.pct>0);
  const somaPct=partes.reduce((s,p)=>s+p.pct,0);
  if(!partes.length){notify('Informe ao menos um percentual','err');return;}
  if(Math.abs(somaPct-100)>0.5){notify(`Atenção: os percentuais somam ${somaPct.toFixed(1)}% (não 100%). Regra salva mesmo assim — revise.`,'info');}
  const lst=load(pk('rateios'));
  lst.push({id:uuid(),nome,partes});
  save(pk('rateios'),lst);
  notify('Regra de rateio criada','ok');render();
}
function delRateioRegra(id){
  save(pk('rateios'),load(pk('rateios')).filter(r=>r.id!==id));render();
}

  const data=document.getElementById('rl-data').value;
  const base={id:uuid(),regraId,valor,data,comprovantes:[]};
  const fileInput=document.getElementById('rl-file');
  lerArquivo(fileInput,()=>nomeAutomatico(regra?regra.nome:'RATEIO','CONTA-1'),(comp)=>{
    if(comp)base.comprovantes.push(comp);
    const lst=load(pkPeriodo('rateio_lanc'));
    lst.push(base);
    save(pkPeriodo('rateio_lanc'),lst);
    // gera automaticamente uma despesa direta por imóvel, com a cota calculada
    if(regra){
      const desp=load(pkPeriodo('despesas'));
      calcularCotasAjustadas(valor,regra.partes).forEach(c=>{
        if(c.cota>0){
          desp.push({id:uuid(),imovelId:c.imovelId,desc:`${regra.nome} (rateio ${c.pct}%)`,valor:c.cota,forma:'Rateio',data,comprovantes:[],rateioLancId:base.id});
        }
      });
      save(pkPeriodo('despesas'),desp);
    }
    notify('Conta rateada, cotas calculadas e lançadas como despesa de cada imóvel','ok');render();
  });
}
function delRateioLanc(id){
  if(!confirm('Excluir esta conta rateada? As despesas que foram criadas automaticamente para cada imóvel também serão removidas.'))return;
  save(pkPeriodo('rateio_lanc'),load(pkPeriodo('rateio_lanc')).filter(r=>r.id!==id));
  save(pkPeriodo('despesas'),load(pkPeriodo('despesas')).filter(d=>d.rateioLancId!==id));
  notify('Conta rateada e despesas vinculadas excluídas','ok');render();
}
function abrirAnexarComprovanteRateio(id){
  document.getElementById('modal-root').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)fecharModal()">
    <div class="modal" style="width:400px">
      <h2>Anexar Comprovante</h2>
      <p>Adiciona mais um comprovante a esta conta rateada, sem substituir os já anexados.</p>
      <div class="fl" style="margin-bottom:20px"><label>Arquivo (PDF/imagem)</label><input class="fi" id="anr-file" type="file" accept=".pdf,image/*"></div>
      <div style="display:flex;gap:10px">
        <button class="btn-gold" style="flex:1" onclick="confirmarAnexarComprovanteRateio('${id}')">Anexar</button>
        <button class="btn-ghost" onclick="fecharModal()">Cancelar</button>
      </div>
    </div>
  </div>`;
}
function confirmarAnexarComprovanteRateio(id){
  const lst=load(pkPeriodo('rateio_lanc'));
  const it=lst.find(r=>r.id===id);
  if(!it)return;
  const fileInput=document.getElementById('anr-file');
  if(!fileInput.files[0]){notify('Selecione um arquivo','err');return;}
  const regra=load(pk('rateios')).find(r=>r.id===it.regraId);
  const n=(it.comprovantes||[]).length+1;
  lerArquivo(fileInput,()=>nomeAutomatico(regra?regra.nome:'RATEIO','CONTA-'+n),(comp)=>{
    if(!it.comprovantes)it.comprovantes=[];
    if(comp)it.comprovantes.push(comp);
    save(pkPeriodo('rateio_lanc'),lst);
    fecharModal();
    notify('Comprovante anexado','ok');render();
  });
}

  <div class="form-card">

function addTransferencia(){

  save(pkPeriodo('transferencias'),lst);
  notify('Transferência registrada','ok');render();
}

// ── UTIL: excluir item genérico de listas do período ──
function delItem(tipo,id){
  save(pkPeriodo(tipo),load(pkPeriodo(tipo)).filter(r=>r.id!==id));render();
}

// ── CÁLCULO CONSOLIDADO DO MÊS ──
function calcMes(imovelIdFiltro){
  let ims=getImoveis();
  if(imovelIdFiltro) ims=ims.filter(i=>i.id===imovelIdFiltro);
  const alug=load(pkPeriodo('alugueis'));
  const desp=load(pkPeriodo('despesas'));
  const cond=load(pkPeriodo('condominio'));
  const transf=load(pkPeriodo('transferencias'));
  const rep=load(pkPeriodo('repasses'));
  const porImovel=ims.map(im=>{
    const liquido=alug.filter(r=>r.imovelId===im.id).reduce((s,r)=>s+(+r.liquido||0),0);
    const despesas=desp.filter(r=>r.imovelId===im.id).reduce((s,r)=>s+(+r.valor||0),0);
    const condPend=cond.filter(r=>r.imovelId===im.id && !r.devolvido).reduce((s,r)=>s+(+r.valor||0),0);
    const iptuAPagar=rep.filter(r=>r.imovelId===im.id && r.status==='recebido_a_pagar').reduce((s,r)=>s+(+r.valor||0),0);
    // Nota: o valor de IPTU repassado ao proprietário (recebido_a_pagar) NÃO entra no líquido
    // acima nem é descontado aqui — ele nunca foi contado como renda, então fica só como
    // alerta informativo (dinheiro que está na conta mas é reservado para o IPTU).
    const saldo=liquido-despesas-condPend;
    return {imovel:im,liquido,despesas,condPend,iptuAPagar,saldo};
  });
  const totalLiquido=porImovel.reduce((s,p)=>s+p.liquido,0);
  const totalDespesas=porImovel.reduce((s,p)=>s+p.despesas,0);
  const totalCondPend=porImovel.reduce((s,p)=>s+p.condPend,0);
  const totalIptuAPagar=porImovel.reduce((s,p)=>s+p.iptuAPagar,0);
  const totalSaldo=porImovel.reduce((s,p)=>s+p.saldo,0);
  const totalTransf=transf.reduce((s,r)=>s+(+r.valor||0),0);
  return {porImovel,totalLiquido,totalDespesas,totalCondPend,totalIptuAPagar,totalSaldo,totalTransf,disponivelAposPessoal:totalSaldo-totalTransf};
}

// ── DASHBOARD ──

  const c=calcMes();
  return `
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-accent" style="background:var(--gold)"></div><div class="kpi-label">Líquido Recebido</div><div class="kpi-value pos">${fmt(c.totalLiquido)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--red)"></div><div class="kpi-label">Despesas Diretas</div><div class="kpi-value neg">${fmt(c.totalDespesas)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--amber)"></div><div class="kpi-label">Condomínio Pendente</div><div class="kpi-value" style="color:var(--amber)">${fmt(c.totalCondPend)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--red)"></div><div class="kpi-label">IPTU Recebido a Pagar</div><div class="kpi-value" style="color:var(--red)">${fmt(c.totalIptuAPagar)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--blue)"></div><div class="kpi-label">Saldo Imóveis</div><div class="kpi-value ${vc(c.totalSaldo)}">${fmt(c.totalSaldo)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--dim)"></div><div class="kpi-label">Transferido p/ Pessoal</div><div class="kpi-value neg">${fmt(c.totalTransf)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--green)"></div><div class="kpi-label">Disponível Após Pessoal</div><div class="kpi-value ${vc(c.disponivelAposPessoal)}">${fmt(c.disponivelAposPessoal)}</div></div>
  </div>
  <div class="sec-hdr"><h2>Saldo por Imóvel</h2><div class="sec-line"></div></div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Imóvel</th><th>Líquido</th><th>Despesas</th><th>Condomínio Pendente</th><th>IPTU a Pagar</th><th>Saldo</th></tr></thead>
    <tbody>
      ${c.porImovel.length?c.porImovel.map(p=>`<tr><td>${p.imovel.nome}</td><td class="pos">${fmt(p.liquido)}</td><td class="neg">${fmt(p.despesas)}</td><td style="color:var(--amber)">${fmt(p.condPend)}</td><td style="color:var(--red)">${fmt(p.iptuAPagar)}</td><td class="${vc(p.saldo)}"><strong>${fmt(p.saldo)}</strong></td></tr>`).join(''):`<tr><td colspan="6"><div class="empty">Cadastre imóveis e lance o mês para ver o resultado aqui.</div></td></tr>`}
    </tbody>
    <tfoot><tr class="tfoot"><td>Total</td><td class="pos">${fmt(c.totalLiquido)}</td><td class="neg">${fmt(c.totalDespesas)}</td><td style="color:var(--amber)">${fmt(c.totalCondPend)}</td><td style="color:var(--red)">${fmt(c.totalIptuAPagar)}</td><td class="${vc(c.totalSaldo)}">${fmt(c.totalSaldo)}</td></tr></tfoot>
  </table></div>`;
}

// ── DRE ──
function renderDRE(){
  const ims=getImoveis();
  const filtro=ST.dreImovelId||'';
  const c=calcMes(filtro||undefined);
  const row=(l,v,cls)=>`<div class="dre-row"><div class="dre-l">${l}</div><div class="dre-v ${cls||''}">${fmt(v)}</div></div>`;
  const nomeImovel=filtro?imovelNome(filtro):null;
  return `
  <div class="form-card" style="padding:14px 18px;margin-bottom:20px">
    <div class="fl"><label>Ver resultado de</label><select class="fi" id="dre-filtro-im" onchange="ST.dreImovelId=this.value;render()" style="max-width:320px">
      <option value=""${!filtro?' selected':''}>Todos os Imóveis (consolidado)</option>
      ${ims.map(i=>`<option value="${i.id}"${filtro===i.id?' selected':''}>${i.nome}</option>`).join('')}
    </select></div>
  </div>
  <div class="dre-hdr"><div class="dre-row"><div class="dre-l">Faturamento${nomeImovel?' — '+nomeImovel:''}</div></div></div>
  ${row('Aluguéis (líquido recebido)',c.totalLiquido,'pos')}
  <div class="dre-sub"><div class="dre-row"><div class="dre-l">Total Entradas</div><div class="dre-v pos">${fmt(c.totalLiquido)}</div></div></div>
  <div class="dre-hdr"><div class="dre-row"><div class="dre-l">Despesas</div></div></div>
  ${row('Despesas diretas (manutenção etc.)',c.totalDespesas,'neg')}
  ${row('Condomínio pendente de devolução',c.totalCondPend,'neg')}
  <div class="dre-sub"><div class="dre-row"><div class="dre-l">Total Despesas</div><div class="dre-v neg">${fmt(c.totalDespesas+c.totalCondPend)}</div></div></div>
  <div class="dre-hdr"><div class="dre-row"><div class="dre-l">Resultado</div></div></div>
  ${row(filtro?`Lucro/Prejuízo — ${nomeImovel}`:'Saldo Imóveis do Mês',c.totalSaldo,vc(c.totalSaldo))}
  ${filtro?'':row('(–) Transferido para Pessoal',c.totalTransf,'neg')}
  ${filtro?'':`<div class="dre-sub"><div class="dre-row"><div class="dre-l">Disponível Após Pessoal</div><div class="dre-v ${vc(c.disponivelAposPessoal)}">${fmt(c.disponivelAposPessoal)}</div></div></div>`}
  ${filtro?`<div class="sec-note" style="margin-top:8px">A transferência para Pessoal é um controle geral, não por imóvel — por isso não aparece neste recorte. Veja o consolidado em "Todos os Imóveis" para esse número.</div>`:''}
  ${c.totalIptuAPagar>0?`<div class="sec-note" style="margin-top:20px;color:var(--red)">⚠ Existe ${fmt(c.totalIptuAPagar)} de IPTU que a imobiliária repassou pra você (não descontou) e ainda não foi pago. Esse valor está fisicamente na sua conta mas não é seu — separe-o antes de mexer no saldo abaixo. Acompanhe em "IPTU / Água".</div>`:''}
  <div class="sec-note" style="margin-top:12px">IPTU e água descontados diretamente pela imobiliária não entram neste DRE porque nunca chegaram a compor o valor líquido recebido — evita contar a mesma despesa duas vezes. Ficam registrados na aba "IPTU / Água" só para conferência e comprovação.</div>
  `;
}

// ── NAVEGAÇÃO ──
const TITLES={dashboard:'Dashboard',alugueis:'Aluguéis',repasses:'IPTU / Água — Corretor',despesas:'Despesas Diretas',condominio:'Condomínio Adiantado',rateio:'Contas Rateadas',imoveis:'Cadastro de Imóveis',pessoal:'Transferência para Pessoal',dre:'DRE — Resultado do Mês'};
function setTab(tab,btn){
  ST.tab=tab;
  document.querySelectorAll('.sb-item[data-tab]').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}
function render(){
  document.getElementById('tb-title').textContent=TITLES[ST.tab]||'';
  const fns={dashboard:renderDash,alugueis:renderAlugueis,repasses:renderRepasses,despesas:renderDespesas,condominio:renderCondominio,rateio:renderRateio,imoveis:renderImoveis,pessoal:renderPessoal,dre:renderDRE};
  document.getElementById('content').innerHTML=(fns[ST.tab]||(()=>''))();
}
function changePeriod(){
  ST.mes=Number(document.getElementById('sel-mes').value);
  ST.ano=Number(document.getElementById('sel-ano').value);
  syncFromFB().then(render).catch(render);
}

function initApp(){
  const ms=document.getElementById('sel-mes'),ys=document.getElementById('sel-ano');
  ms.innerHTML=MESES.map((m,i)=>`<option value="${i+1}"${i+1===ST.mes?' selected':''}>${m}</option>`).join('');
  const y=ST.ano;
  ys.innerHTML=[y-1,y,y+1].map(v=>`<option value="${v}"${v===y?' selected':''}>${v}</option>`).join('');
  syncFromFB().then(render).catch(render);
}

// ── BOOT ──
if(sessionStorage.getItem('imoveisfg_auth')==='1'){
  document.getElementById('login-screen').style.display='none';
  initApp();
} else {
  document.getElementById('login-screen').style.display='flex';
}
</script>
