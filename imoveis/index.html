<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMÓVEIS — Família Guerra Holding</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F6F6F3;--bg-card:#FFFFFF;--bg-hover:#F0F1EE;--bg-section:#F1F2EE;--bg-sub:#F4F5F1;
  --border:#E1E2DC;--border-lite:#EAEBE6;
  --gold:#2F6F5E;--gold-lt:#255A4C;--gold-dim:#BFDFD5;--gold-bg:#EAF5F1;
  --text:#1B1D1B;--muted:#5C5E58;--dim:#94958E;
  --green:#1D8348;--red:#C0392B;--blue:#1F6B85;--amber:#B4740E;
  --btn-neon-border-width:2px;
  --btn-neon-bg:#22272B;--btn-neon-border-color:#10B981;--btn-neon-glow:rgba(16,185,129,.4);--btn-neon-text:#10B981;
}
.dark-mode{
  --bg:#1A1D20;--bg-card:#22272B;--bg-hover:#282E33;--bg-section:#262B2F;--bg-sub:#262B2F;
  --border:#333A3F;--border-lite:#2C3236;
  --gold:#4FAE94;--gold-lt:#63C4A9;--gold-dim:#3A5A50;--gold-bg:#1E2C28;
  --text:#E0E6ED;--muted:#90A4AE;--dim:#697680;
  --green:#4ADE80;--red:#F87171;--blue:#5DADE2;--amber:#F5B041;
  --btn-neon-bg:#12181B;--btn-neon-border-color:#34D399;--btn-neon-glow:rgba(52,211,153,.5);--btn-neon-text:#34D399;
}
html,body,*{transition:background-color .2s ease,border-color .2s ease,color .2s ease}
button,.btn-gold,.btn-ghost,.btn-sm{
  background-color:var(--btn-neon-bg)!important;
  border:var(--btn-neon-border-width) solid var(--btn-neon-border-color)!important;
  color:var(--btn-neon-text)!important;
  box-shadow:0 0 10px var(--btn-neon-glow)!important;
  transition:box-shadow .3s ease!important;
}
button:hover,.btn-gold:hover,.btn-ghost:hover,.btn-sm:hover{
  box-shadow:0 0 15px var(--btn-neon-glow)!important;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{display:flex;min-height:100vh}
.sidebar{width:230px;min-width:230px;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;box-shadow:1px 0 3px rgba(20,20,20,.03)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:56px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;position:sticky;top:0;z-index:50}
.content{flex:1;padding:28px 24px 80px;overflow-y:auto}
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sb-logo-eye{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.sb-logo-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text);line-height:1.1}
.sb-logo-sub{font-size:10px;color:var(--dim);margin-top:2px}
.sb-section{padding:12px 18px 4px;font-size:9px;font-weight:700;letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:6px;cursor:pointer;transition:all .15s;color:var(--muted);font-size:12px;font-weight:500;border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:'DM Sans',sans-serif}
.sb-item:hover{background:var(--bg-hover);color:var(--text)}
.sb-item.active{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-dim)}
.sb-bottom{margin-top:auto;padding:14px 10px;border-top:1px solid var(--border)}
.imovel-sel{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;outline:none;cursor:pointer}
.imovel-sel:focus{border-color:var(--gold)}
.tb-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);letter-spacing:.04em;flex:1}
.tb-period{display:flex;align-items:center;gap:8px}
.tb-sel{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 9px;outline:none;cursor:pointer}
.tb-sel:focus{border-color:var(--gold)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;border-radius:5px;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{background:var(--gold);color:#fff;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:6px;padding:9px 18px;cursor:pointer;transition:background .15s}
.btn-gold:hover{background:var(--gold-lt)}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
.btn-sm:hover{border-color:var(--red);color:var(--red)}
.btn-ok{border-color:transparent;color:var(--muted)}
.btn-ok:hover{border-color:var(--green);color:var(--green)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:14px;margin-bottom:28px}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s;box-shadow:0 1px 3px rgba(20,20,20,.05)}
.kpi:hover{border-color:var(--gold-dim)}
.kpi-accent{position:absolute;top:0;left:0;right:0;height:2px}
.kpi-label{font-size:10px;font-weight:600;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.2;white-space:nowrap}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:5px}
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sec-hdr h2{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-note{font-size:11px;color:var(--dim);margin:-8px 0 16px;line-height:1.6}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;margin-bottom:24px;background:var(--bg-card);box-shadow:0 1px 3px rgba(20,20,20,.04)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg-section);padding:9px 14px;text-align:right;font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}
td{padding:8px 14px;border-bottom:1px solid var(--border-lite);vertical-align:middle;font-variant-numeric:tabular-nums}
td:not(:first-child){text-align:right}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-hover)}
.tfoot td{background:var(--bg-sub);border-top:1px solid var(--border);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;border-bottom:none}
.tfoot td:first-child{text-align:left}
.pos{color:var(--green)}.neg{color:var(--red)}.gold{color:var(--gold)}.dim{color:var(--dim)}
.form-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:22px;box-shadow:0 1px 3px rgba(20,20,20,.04)}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:14px}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.fi{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--dim)}
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;white-space:nowrap}
.b-ok{background:#E7F5EC;color:var(--green);border:1px solid #BFE3CC}
.b-pend{background:#FCF1DD;color:var(--amber);border:1px solid #F0D9A6}
.b-late{background:#FBD5D0;color:#A6291A;border:1px solid #E8A599;font-weight:800}
.b-soon{background:#FCE3B8;color:#8A5A00;border:1px solid #EFC372;font-weight:700}
.b-blue{background:#E8F1F5;color:var(--blue);border:1px solid #C3DCE6}
.dark-mode .dim,.dark-mode .muted,.dark-mode td.dim{color:#CBD5E1}
.dark-mode th{color:#94A3B8;font-weight:600}
.dark-mode .b-blue{background:rgba(16,185,129,.15);color:#34D399;border:1px solid rgba(52,211,153,.3)}
.dark-mode .b-pend,.dark-mode .b-soon{background:rgba(245,158,11,.15);color:#FBBF24;border:1px solid rgba(251,191,36,.3);font-weight:700}
.dark-mode .b-late{background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(248,113,113,.3);font-weight:700}
.b-info{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-dim)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;gap:0}
.tab-btn{padding:9px 18px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover:not(.active){color:var(--text)}
.dre-row{display:flex;border-bottom:1px solid var(--border-lite)}
.dre-l{flex:1;padding:10px 16px;display:flex;align-items:center;font-size:13px}
.dre-v{width:180px;min-width:180px;display:flex;align-items:center;justify-content:flex-end;padding:10px 16px;font-size:13px;font-variant-numeric:tabular-nums}
.dre-hdr{background:var(--bg-section);border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-top:8px}
.dre-hdr:first-child{margin-top:0}
.dre-hdr .dre-l{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
.dre-hdr .dre-l::before{content:'';width:3px;height:13px;background:var(--gold);border-radius:2px;flex-shrink:0;margin-right:10px}
.dre-sub{background:var(--bg-sub);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.dre-sub .dre-l{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.empty{display:flex;flex-direction:column;align-items:center;padding:50px 20px;color:var(--dim);gap:10px;text-align:center;font-size:13px}
.file-drop{border:1px dashed var(--border);border-radius:8px;padding:14px;font-size:12px;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
.file-drop:hover{border-color:var(--gold);color:var(--gold)}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg-sub);border:1px solid var(--border);border-radius:5px;padding:4px 9px;font-size:11px;color:var(--text);white-space:nowrap;max-width:100%;overflow:hidden}
.file-chip a{color:var(--gold);text-decoration:none}
#notif{position:fixed;top:18px;right:18px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.ni{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:11px 15px;font-size:12px;display:flex;align-items:center;gap:8px;min-width:240px;pointer-events:all;animation:sli .2s ease}
.ni.ok{border-left:3px solid var(--green)}.ni.err{border-left:3px solid var(--red)}.ni.info{border-left:3px solid var(--gold)}
@keyframes sli{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-bg{position:fixed;inset:0;background:rgba(20,22,20,.55);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg-card);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:12px;padding:32px;width:440px;max-width:92vw;max-height:86vh;overflow-y:auto;box-shadow:0 8px 30px rgba(20,20,20,.18)}
.modal h2{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:6px}
.modal p{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6}
@media(max-width:768px){.sidebar{display:none}.content{padding:14px 12px 80px}.kpi-grid{grid-template-columns:1fr 1fr}.kpi-value{font-size:14px}}
@media print{.sidebar,.topbar{display:none!important}.content{padding:0}body{background:#fff;color:#000}}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
</head>

<div id="notif"></div>

<div id="app">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-eye">Família Guerra Holding</div>

    <button class="sb-item active" data-tab="dashboard" onclick="setTab('dashboard',this)">📊 Dashboard</button>

<script>
// ── LOGIN — mesmas credenciais do sistema Mr. Capas ──
const CREDS={u:'Guerra',p:'Resiliencia2023@'};
const CREDS_EXTRA=[
  {u:'TERRA',p:'110205',nome:'Terra'},
  {u:'PAIVA',p:'913700',nome:'Paiva'},
];
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const NOW=new Date();
const ST={tab:'dashboard',mes:NOW.getMonth()+1,ano:NOW.getFullYear()};
const BRL=new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const fmt=n=>BRL.format(n||0);
const vc=n=>n>0?'pos':n<0?'neg':'dim';
const uuid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
const pad2=n=>String(n).padStart(2,'0');

function notify(msg,type){
  const box=document.getElementById('notif');
  const el=document.createElement('div');
  el.className='ni '+(type||'info');
  el.textContent=msg;
  box.appendChild(el);
  setTimeout(()=>el.remove(),3200);
}

// ── PERSISTÊNCIA LOCAL + CHAVES ──
function pk(t){return `imoveisfg_${t}`}
function pkPeriodo(t){return `imoveisfg_${t}_${ST.ano}_${pad2(ST.mes)}`}
function load(k){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch(e){return []}}
function save(k,d){
  let localOk=true;
  try{
    localStorage.setItem(k,JSON.stringify(d));
  }catch(e){
    localOk=false;
    console.error('localStorage cheio, salvando só na nuvem:',e);
    notify('Aviso: cache local cheio, mas os dados vão para a nuvem normalmente.','info');
  }
  pushToFB(localOk?null:{[k]:d});
}

// ── FIREBASE — mesmo projeto, caminho separado do Mr. Capas ──
firebase.initializeApp({
  apiKey:'AIzaSyBdp0xbPdybkjI8D-mp-_uI57qUHxhDXvg',
  databaseURL:'https://grupofamiliaguerra-9d13e-default-rtdb.firebaseio.com',
  projectId:'grupofamiliaguerra-9d13e'
});
const _db=firebase.database();
const _dbRef=_db.ref('imoveisfg');
const _filesRef=_db.ref('imoveisfg_files');
let _syncTimer=null,_pushInProgress=false;

function setSyncStatus(msg,cor){
  const el=document.getElementById('sync-status');
  if(el){el.textContent=msg;el.style.color=cor||'var(--muted)';}
}
function _coletaDados(override){
  const d={_ts:Date.now()};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k && k.startsWith('imoveisfg_')){
      try{d[k]=JSON.parse(localStorage.getItem(k));}catch(e){d[k]=localStorage.getItem(k);}
    }
  }
  if(override)Object.assign(d,override);
  return d;
}
function pushToFB(override){
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(()=>{
    setSyncStatus('⟳ Salvando...','var(--amber)');
    _dbRef.set(_coletaDados(override)).then(()=>{
      setSyncStatus('✓ Salvo','var(--green)');
      setTimeout(()=>setSyncStatus('• Online','var(--green)'),2000);
    }).catch(e=>{
      setSyncStatus('⚠ '+e.message,'var(--red)');
      notify('Erro ao salvar: '+e.message,'err');
    });
  },250);
}
function aplicarDados(rec){
  if(!rec||typeof rec!=='object')return;
  Object.entries(rec).forEach(([k,v])=>{
    if(k && k.startsWith('imoveisfg_')) localStorage.setItem(k,JSON.stringify(v));
  });
}
function syncFromFB(){
  setSyncStatus('⟳ Carregando...','var(--amber)');

    if(rec){aplicarDados(rec);setSyncStatus('✓ Sincronizado','var(--green)');}

// ── UPLOAD DE COMPROVANTE (base64, renomeado automaticamente) ──
// Padrão de nome: IMOVEL_TIPOCONTA_MESANO.ext
function slug(s){return (s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9]+/g,'').slice(0,20)||'ARQ'}
function nomeAutomatico(imovelNome,tipoConta){
  const ext='pdf';
  return `${slug(imovelNome)}_${slug(tipoConta)}_${pad2(ST.mes)}${ST.ano}`;
}
function lerArquivoCore(f,cbNomeBase,onDone){
  if(!f){onDone(null);return;}
  if(f.size>4*1024*1024){notify('Arquivo maior que 4MB — reduza o tamanho do PDF/foto.','err');onDone(null);return;}
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const ext=(f.name.split('.').pop()||'pdf').toLowerCase();
      const nomeFinal=`${cbNomeBase()}.${ext}`;
      const fileId=uuid()+uuid();
      // Envia o conteúdo do arquivo direto pro Firebase (sem limite de 5-10MB do localStorage).
      // Não esperamos a confirmação pra não travar o formulário — o SDK do Firebase enfileira o envio.
      _filesRef.child(fileId).set(reader.result).catch(e=>{
        console.error('Erro ao enviar arquivo para a nuvem:',e);
        notify('Aviso: o arquivo "'+f.name+'" pode não ter sido salvo na nuvem ('+e.message+').','err');
      });
      onDone({nomeOriginal:f.name,nomeFinal,mime:f.type,tamanho:f.size,fileId});
    }catch(e){
      console.error('Erro ao processar arquivo:',e);
      notify('Erro ao processar o arquivo "'+f.name+'": '+e.message,'err');
      onDone(null);
    }
  };
  reader.onerror=()=>{
    notify('Não consegui ler o arquivo "'+f.name+'" — tente outro arquivo ou uma foto mais leve.','err');
    onDone(null);
  };
  reader.readAsDataURL(f);
}
function lerArquivo(inputEl,cbNomeBase,onDone){
  lerArquivoCore(inputEl.files[0],cbNomeBase,onDone);
}
function comprovanteChip(comp){
  if(!comp) return `<span class="dim" style="font-size:11px">sem comprovante</span>`;
  const dataAttr=JSON.stringify(comp).replace(/'/g,'&apos;');
  return `<span class="file-chip">📎 <a href="#" onclick="event.preventDefault();abrirComprovante(this)" data-file='${dataAttr}'>${comp.nomeFinal}</a> <a href="#" onclick="event.preventDefault();baixarComprovante(this)" data-file='${dataAttr}' title="baixar" style="color:var(--dim);text-decoration:none">⬇</a></span>`;
}
function comprovanteChipRotulo(comp,rotulo){
  if(!comp) return `<span class="dim" style="font-size:11px">—</span>`;
  const dataAttr=JSON.stringify(comp).replace(/'/g,'&apos;');
  return `<span class="file-chip" style="white-space:nowrap;max-width:100%;overflow:hidden;display:inline-flex" title="${(comp.nomeFinal||'').replace(/"/g,'&quot;')}"><a href="#" onclick="event.preventDefault();abrirComprovante(this)" data-file='${dataAttr}' style="white-space:nowrap">${rotulo}</a> <a href="#" onclick="event.preventDefault();baixarComprovante(this)" data-file='${dataAttr}' title="baixar" style="color:var(--dim);text-decoration:none">⬇</a></span>`;
}
async function obterDadosArquivo(comp){
  if(comp.data) return comp.data; // arquivos salvos antes desta correção, ainda embutidos
  if(comp.fileId){
    const snap=await _filesRef.child(comp.fileId).once('value');
    const v=snap.val();
    if(!v) throw new Error('arquivo não encontrado na nuvem');
    return v;
  }
  throw new Error('sem referência de arquivo');
}
function abrirComprovante(el){
  const comp=JSON.parse(el.getAttribute('data-file').replace(/&apos;/g,"'"));
  const w=window.open('');
  w.document.write('<title>Carregando...</title><body style="font-family:sans-serif;padding:40px;text-align:center;color:#666">Carregando arquivo...</body>');
  obterDadosArquivo(comp).then(data=>{
    w.document.open();
    if(comp.mime && comp.mime.startsWith('image/')){
      w.document.write(`<title>${comp.nomeFinal}</title><body style="margin:0;background:#F0F0EE;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${data}" style="max-width:100%;max-height:100vh"></body>`);
    } else {
      w.document.write(`<title>${comp.nomeFinal}</title><style>html,body,iframe{margin:0;padding:0;width:100%;height:100%;border:none}</style><iframe src="${data}"></iframe>`);
    }
    w.document.close();
  }).catch(e=>{
    w.document.open();
    w.document.write('<body style="font-family:sans-serif;padding:40px;color:#c00">Erro ao carregar o arquivo: '+e.message+'</body>');
    w.document.close();
  });
}
function baixarComprovante(el){
  const comp=JSON.parse(el.getAttribute('data-file').replace(/&apos;/g,"'"));
  notify('Preparando download...','info');
  obterDadosArquivo(comp).then(data=>{
    const a=document.createElement('a');
    a.href=data;
    a.download=comp.nomeFinal;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }).catch(e=>notify('Erro ao baixar o arquivo: '+e.message,'err'));
}

// ── AGRUPAMENTO DE IMÓVEIS EM MÓDULOS (ordem fixa definida pelo usuário) ──
const GRUPOS_ORDEM=[
  {titulo:'Paul Harris',match:['paul harris']},
  {titulo:'CHAVEIRO',match:['getulio vargas','getúlio vargas']},
  {titulo:'Rua Rudy Alberto',match:['rudy alberto']},
  {titulo:'RESIDENCIAL FAMILIA GUERRA',match:['erineia','erinéia','residencial familia guerra','residencial família guerra']},
  {titulo:'Travessa Gomes',match:['travessa gomes']},
  {titulo:'SALAS COMERCIAIS ENGRACIA',match:['engracia','engrácia']},
  {titulo:'James Mendonça',match:['james mendonca','james mendonça','mendonca','mendonça']},
  {titulo:'Recanto Família Guerra',match:['recanto']},
  {titulo:'Rua Carioca',match:['rua carioca','carioca']},
  {titulo:'Rua Ouro Preto',match:['ouro preto']},
  {titulo:'Rua Liliane',match:['liliane']},
];
function getGrupoTitulo(imovelNome){
  const n=normTxt(imovelNome||'');
  // Regra especial: Sala 603 e Sala 609 sempre vão para Salas Comerciais Engracia,
  // mesmo que o endereço cite outro logradouro (ex: Av Getúlio Vargas, 221, Sala 609)
  if(n.includes('SALA 603')||n.includes('SALA 609')) return 'SALAS COMERCIAIS ENGRACIA';
  const g=GRUPOS_ORDEM.find(g=>g.match.some(m=>n.includes(normTxt(m))));
  return g?g.titulo:null;
}
function ordemNatural(a,b){
  return String(a).localeCompare(String(b),'pt-BR',{numeric:true,sensitivity:'base'});
}
function montarModulos(){
  const ims=getImoveis();
  const usados=new Set();
  const modulos=GRUPOS_ORDEM.map(g=>{
    const imsDoGrupo=ims.filter(im=>getGrupoTitulo(im.nome)===g.titulo).sort((a,b)=>ordemNatural(a.nome,b.nome));
    imsDoGrupo.forEach(im=>usados.add(im.id));
    return {titulo:g.titulo,imoveis:imsDoGrupo};
  });
  // imóveis que não caíram em nenhum grupo fixo — cada um vira seu próprio módulo, no final
  const orfaos=ims.filter(im=>!usados.has(im.id));
  orfaos.forEach(im=>modulos.push({titulo:im.nome,imoveis:[im]}));
  return modulos;
}

function parseBRNum(s){
  if(!s)return 0;
  return parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0;
}
function normTxt(s){return (s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function parseRelatorioAlude(text){
  const g=(re)=>{const m=text.match(re);return m?m[1].trim():null};
  const valorRepassado=parseBRNum(g(/Valor repassado[\s\S]{0,40}?R\$\s?([\d.,]+)/));
  const dataRepasse=g(/(\d{2}\/\d{2}\/\d{4})\s*(?:às|as)/);
  const dataVencimento=g(/Data de vencimento da cobran[cç]a\s+(\d{2}\/\d{2}\/\d{4})/i);
  const referente=g(/Referente a\s+([A-Za-zçÇéÉ]+\/\d{4})/);
  const imovelAddr=g(/Im[oó]vel\s+([\s\S]+?)\s+Locat[aá]rio/);
  const locatario=g(/Locat[aá]rio\s+([^\n(]+?)\s*\(/);
  const imobiliaria=g(/Imobili[aá]ria\s+([^\n(]+?)\s*\(/);
  const cobradoSection=(text.split(/O QUE FOI COBRADO/)[1]||'').split(/O QUE FOI TRANSFERIDO/)[0];
  // Relatórios com 2+ páginas repetem o cabeçalho "O QUE FOI TRANSFERIDO" na página seguinte —
  // por isso juntamos TODAS as partes que vêm depois de cada ocorrência, não só até a próxima.
  const transferSection=text.split(/O QUE FOI TRANSFERIDO/).slice(1).join(' ');
  const alugCobrado=parseBRNum((cobradoSection.match(/Aluguel\s*(?:\([^)]*\))?\s*R\$\s?([\d.,]+)/)||[])[1]);
  const iptuCobrado=parseBRNum((cobradoSection.match(/IPTU\s+R\$\s?([\d.,]+)/)||[])[1]);
  const alugTransf=parseBRNum((transferSection.match(/Aluguel\s+R\$\s?([\d.,]+)/)||[])[1]);
  const iptuTransf=parseBRNum((transferSection.match(/IPTU\s+R\$\s?([\d.,]+)/)||[])[1]);
  const aguaCobrado=parseBRNum((cobradoSection.match(/[ÁA]gua\s+R\$\s?([\d.,]+)/i)||[])[1]);
  const aguaTransf=parseBRNum((transferSection.match(/[ÁA]gua\s+R\$\s?([\d.,]+)/i)||[])[1]);
  // Juros e multa por atraso — podem aparecer cobrados e/ou repassados ao proprietário
  const jurosCobrado=parseBRNum((cobradoSection.match(/(?:Juros|Multa)[^\n\d]*R\$\s?([\d.,]+)/)||[])[1]);
  const jurosTransf=parseBRNum((transferSection.match(/(?:Juros|Multa)[^\n\d]*R\$\s?([\d.,]+)/)||[])[1]);
  // Taxa de manutenção/administração cobrada do inquilino mas retida pela imobiliária (não repassada ao proprietário)
  const taxaManutCobrado=parseBRNum((cobradoSection.match(/Taxa de manuten[cç][aã]o[^\n\d]*R\$\s?([\d.,]+)/i)||[])[1]);
  const condoTransf=parseBRNum((transferSection.match(/Condom[ií]nio\s+R\$\s?([\d.,]+)/i)||[])[1]);
  // Bruto = TOTAL de tudo que foi cobrado do inquilino (aluguel + IPTU + água + condomínio + juros + taxas)
  const totalCobradoMatch=cobradoSection.match(/Total\s+R\$\s?([\d.,]+)/);
  const totalCobrado=parseBRNum(totalCobradoMatch?totalCobradoMatch[1]:null);
  return {valorRepassado,dataRepasse,dataVencimento,referente,imovelAddr,locatario,imobiliaria,alugCobrado,iptuCobrado,alugTransf,iptuTransf,jurosCobrado,jurosTransf,taxaManutCobrado,aguaCobrado,aguaTransf,condoTransf,totalCobrado};
}
function matchImovel(addr){
  if(!addr)return null;
  const na=normTxt(addr).replace(/[^A-Z0-9]+/g,' ').trim();
  const ims=getImoveis();
  // 1) match exato/quase exato pelo campo Endereço (o mais confiável — é o texto cru do relatório)
  const exato=ims.find(im=>im.endereco && normTxt(im.endereco).replace(/[^A-Z0-9]+/g,' ').trim()===na);
  if(exato)return exato;
  // 2) match por maioria das palavras do endereço (caso o endereço cadastrado esteja levemente diferente)
  const palavrasAddr=na.split(' ').filter(w=>w.length>2);
  let best=null,bestScore=0;
  ims.forEach(im=>{
    if(!im.endereco)return;
    const alvo=normTxt(im.endereco).replace(/[^A-Z0-9]+/g,' ');
    const score=palavrasAddr.filter(w=>alvo.includes(w)).length/palavrasAddr.length;
    if(score>bestScore){bestScore=score;best=im;}
  });
  if(best && bestScore>=0.7)return best;
  // 3) fallback: nome + endereço combinados, contagem simples de palavras em comum
  best=null;bestScore=0;
  ims.forEach(im=>{
    const alvo=normTxt(im.nome+' '+(im.endereco||''));
    const score=palavrasAddr.filter(w=>alvo.includes(w)).length;
    if(score>bestScore){bestScore=score;best=im;}
  });
  return bestScore>0?best:null;
}

function ddmmyyyy2iso(d){
  if(!d)return today();
  const [dd,mm,yy]=d.split('/');
  return `${yy}-${mm}-${dd}`;
}
function isoParaBR(iso){
  if(!iso)return '';
  const [yy,mm,dd]=iso.split('-');
  if(!yy||!mm||!dd)return iso;
  return `${dd}/${mm}/${yy}`;
}
function handlePDFFile(input){
  const f=input.files[0];
  if(!f)return;
  document.getElementById('pdf-import-status').textContent='⟳ Lendo PDF...';
  const readerBin=new FileReader();
  readerBin.onload=async()=>{
    try{
      const typedarray=new Uint8Array(readerBin.result);
      const pdf=await pdfjsLib.getDocument({data:typedarray}).promise;
      let fullText='';
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p);
        const tc=await page.getTextContent();
        fullText+=tc.items.map(it=>it.str).join(' ')+' ';
      }
      const parsed=parseRelatorioAlude(fullText);
      const readerB64=new FileReader();
      readerB64.onload=()=>{
        _pdfPendingFile={nomeOriginal:f.name,mime:f.type,data:readerB64.result,tamanho:f.size};
        abrirPreviewImportPDF(parsed);
        document.getElementById('pdf-import-status').textContent='✓ PDF lido — confira os dados abaixo antes de lançar.';
      };
      readerB64.readAsDataURL(f);
    }catch(e){
      console.error(e);
      document.getElementById('pdf-import-status').textContent='⚠ Não consegui ler este PDF automaticamente. Lance manualmente abaixo.';
    }
  };
  readerBin.readAsArrayBuffer(f);
}

const STATUS_REPASSE=[

function statusOptions(sel){

function diasParaVencimento(vencStr){
  if(!vencStr)return null;
  const hoje=new Date(today()+'T00:00:00');
  const venc=new Date(vencStr+'T00:00:00');
  return Math.round((venc-hoje)/86400000);
}
function statusBadge(r){
  // r pode ser o registro inteiro (uso novo, com verificação de vencimento) ou só a string do status (compat)
  const status=typeof r==='string'?r:r.status;
  const badgeDe=(v,labelFallback)=>{const s=STATUS_REPASSE.find(x=>x.v===v);return `<span class="badge ${s?s.badge:'b-pend'}">${s?s.l:labelFallback}</span>`;};
  if(status==='pago') return badgeDe('pago','Pago');
  if(status==='vencida') return badgeDe('vencida','Vencida'); // override manual
  if(status==='a_vencer') return badgeDe('a_vencer','A Vencer'); // override manual
  const vencStr=typeof r==='object'?r.envio:null;
  const dias=diasParaVencimento(vencStr);
  if(dias!==null){
    if(dias<0) return badgeDe('vencida','Vencida');
    if(dias<=5) return badgeDe('a_vencer','A Vencer');
  }
  return badgeDe('a_pagar','A Pagar');
}

      lerArquivo(fComp2,()=>nomeAutomatico(imovelNome(imovelId),tipo+'-COMPROVANTE2'),(comp2)=>{

function salvarEdicaoRepasse(id){
  const lst=load(pkPeriodo('repasses'));
  const r=lst.find(x=>x.id===id);

  const novoStatus=document.getElementById('er-status').value;
  const fComp=document.getElementById('er-comprovante');
  const fComp2=document.getElementById('er-comprovante2');
  if(novoStatus==='pago' && !r.comprovantePagamento && !fComp.files[0]){
    document.getElementById('er-erro').style.display='block';

    r.imovelId=document.getElementById('er-im').value;
    r.tipo=document.getElementById('er-tipo').value;
    r.valor=+document.getElementById('er-val').value||0;

    r.status=novoStatus;
    const dataPagtoManual=document.getElementById('er-data-pagamento').value;
    if(dataPagtoManual){
      r.dataPagamento=dataPagtoManual;
    }else if(novoStatus==='pago' && statusAnterior!=='pago'){
      r.dataPagamento=today();
    }
    r.obs=document.getElementById('er-obs').value.trim();

    if(novoStatus==='pago' && statusAnterior!=='pago')playSuccessSound();

  };

    lerArquivo(fComp,()=>nomeAutomatico(imovelNome(r.imovelId),r.tipo+'-COMPROVANTE1'),(comp)=>{
      if(comp)r.comprovantePagamento=comp;
      if(fComp2.files[0]){
        lerArquivo(fComp2,()=>nomeAutomatico(imovelNome(r.imovelId),r.tipo+'-COMPROVANTE2'),(comp2)=>{
          if(comp2)r.comprovantePagamento2=comp2;
          salvarResto();
        });
      }else{
        salvarResto();
      }
    });
  } else if(fComp2.files[0]){
    lerArquivo(fComp2,()=>nomeAutomatico(imovelNome(r.imovelId),r.tipo+'-COMPROVANTE2'),(comp2)=>{
      if(comp2)r.comprovantePagamento2=comp2;

  }
}

function playSuccessSound(){
  try{
    const AudioCtx=window.AudioContext||window.webkitAudioContext;
    if(!AudioCtx)return;
    const ctx=new AudioCtx();
    const now=ctx.currentTime;
    [660,880].forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.type='sine';
      osc.frequency.value=freq;
      const start=now+i*0.12;
      gain.gain.setValueAtTime(0,start);
      gain.gain.linearRampToValueAtTime(0.25,start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,start+0.15);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(start);
      osc.stop(start+0.16);
    });
    setTimeout(()=>ctx.close(),400);
  }catch(e){
    console.warn('Não foi possível tocar o som de confirmação',e);
  }
}

// ── CONTAS RATEADAS (leitura automática do anexo + divisão dinâmica 1-10) ──
function calcularCotasAjustadas(valor,partes){
  const brutos=partes.map(p=>Math.round(valor*p.pct)/100);
  const somaArred=brutos.reduce((s,v)=>s+v,0);
  const diff=Math.round((valor-somaArred)*100)/100;
  const cotas=partes.map((p,i)=>({imovelId:p.imovelId,pct:p.pct,cota:brutos[i]}));
  if(diff!==0 && cotas.length) cotas[cotas.length-1].cota=Math.round((cotas[cotas.length-1].cota+diff)*100)/100;
  return cotas;
}
function normalizarTextoPDF(text){
  return (text||'').replace(/[ \t]+/g,' ').replace(/\n{2,}/g,'\n').trim();
}
const VALOR_MAXIMO_RAZOAVEL=50000; // acima disso, é quase certo que o parser capturou código de barras/CNPJ/chave PIX por engano
function parseLinhaDigitavelValor(text){
  const candidatos=text.match(/[\d][\d.\s]{35,70}\d/g)||[];
  for(const c of candidatos){
    const digitos=c.replace(/\D/g,'');
    if(digitos.length===47){
      // Boleto bancário: os últimos 10 dígitos são o valor (em centavos)
      const valor=parseInt(digitos.slice(-10),10)/100;
      if(valor>0 && valor<=VALOR_MAXIMO_RAZOAVEL)return valor;
    } else if(digitos.length===48||digitos.length===44){
      // Conta de concessionária/IPTU (linha digitável de 48, ou código de barras cru de 44): valor entre o índice 4 e o 15
      const valor=parseInt(digitos.slice(4,15),10)/100;
      if(valor>0 && valor<=VALOR_MAXIMO_RAZOAVEL)return valor;
    }
  }
  return 0;
}
function parseValorTotalGenerico(textoOriginal){
  const text=normalizarTextoPDF(textoOriginal);
  console.log('TEXTO EXTRAÍDO DO PDF:',text);
  const num='(\\d{1,3}(?:\\.\\d{3})*[.,]\\d{2})';
  const padroes=[
    new RegExp('total\\s*a\\s*pagar\\s*\\(r\\$\\)\\D{0,20}'+num,'i'),
    new RegExp('total\\s*a\\s*pagar\\D{0,20}'+num,'i'),
    new RegExp('valor\\s*(?:do\\s*documento|cobrado)\\D{0,20}'+num,'i'),
    new RegExp('valor\\s*a\\s*pagar\\D{0,20}'+num,'i'),
    new RegExp('total\\s*\\(r\\$\\)\\D{0,20}'+num,'i'),
    new RegExp('pague\\s*sua\\s*conta\\s*com\\s*pix\\D{0,40}'+num,'i'),
    new RegExp('valor\\D{0,15}'+num,'i'),
  ];
  for(const re of padroes){
    const m=text.match(re);
    if(m){
      const valor=parseBRNum(m[1]);
      if(valor>VALOR_MAXIMO_RAZOAVEL){console.log('Parser: valor descartado por exceder o limite de sanidade ->',valor);continue;}
      console.log('Parser: valor encontrado com padrão',re,'->',m[1]);
      return valor;
    }
  }
  const linhaDigitavel=parseLinhaDigitavelValor(text);
  if(linhaDigitavel>0){console.log('Parser: valor encontrado pela linha digitável ->',linhaDigitavel);return linhaDigitavel;}
  const todos=[...text.matchAll(/R\$\s?([\d.,]+)/gi)].map(x=>parseBRNum(x[1])).filter(v=>v<=VALOR_MAXIMO_RAZOAVEL);
  if(todos.length){console.log('Parser: usando maior valor R$ encontrado como fallback ->',Math.max(...todos));return Math.max(...todos);}
  console.log('Parser: nenhum valor encontrado — deixando em branco para preenchimento manual.');
  return 0;
}
function parseVencimentoGenerico(textoOriginal){
  const text=normalizarTextoPDF(textoOriginal);
  const m=text.match(/vencimento\D{0,10}(\d{2}\/\d{2}\/\d{4})/i);
  return m?m[1]:null;
}
async function ocrExtrairTexto(imageSourceCanvasOrDataUrl){
  if(!window.Tesseract) throw new Error('OCR indisponível (biblioteca não carregou)');
  const OCR_TIMEOUT_MS=5000;
  const timeoutPromise=new Promise((_,reject)=>setTimeout(()=>reject(new Error('OCR excedeu o tempo limite de 5s')),OCR_TIMEOUT_MS));
  const ocrPromise=Tesseract.recognize(imageSourceCanvasOrDataUrl,'por').then(r=>r.data.text||'');
  return await Promise.race([ocrPromise,timeoutPromise]);
}
async function pdfPrimeiraPaginaParaCanvas(typedarray){
  const pdf=await pdfjsLib.getDocument({data:typedarray}).promise;
  const page=await pdf.getPage(1);
  const viewport=page.getViewport({scale:2.5});
  const canvas=document.createElement('canvas');
  canvas.width=viewport.width;canvas.height=viewport.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport}).promise;
  return canvas;
}

  const aplicarResultado=(valor,venc,origem)=>{
    if(valor>0){
      document.getElementById('rt-valor-total').value=valor.toFixed(2);
      atualizarRateioPreview();
      statusEl.textContent='✓ Valor lido'+(origem?' ('+origem+')':'')+': '+fmt(valor)+(venc?' — vencimento '+venc:'')+' — confira antes de confirmar.';
    }else{
      statusEl.textContent='⚠ Não consegui identificar o valor total automaticamente. Preencha manualmente abaixo.';
    }
    if(venc){
      const [dd,mm,yyyy]=venc.split('/');
      const dataEl=document.getElementById('rt-data');
      if(dataEl)dataEl.value=`${yyyy}-${mm}-${dd}`;
    }
  };
  const tentarOcrImagem=async(src)=>{
    try{
      statusEl.textContent='⟳ Não achei texto direto — tentando reconhecer por OCR (até 5s)...';
      const texto=await ocrExtrairTexto(src);
      aplicarResultado(parseValorTotalGenerico(texto),parseVencimentoGenerico(texto),'via OCR');
    }catch(e){
      console.error('Erro na leitura do PDF:',e);
      statusEl.textContent='⚠️ Arquivo em formato de imagem/escaneado. Digite o valor manualmente.';
    }
  };
  if(f.type==='application/pdf'){
    const readerBin=new FileReader();
    readerBin.onload=async()=>{
      let fullText='';
      let pdfDoc=null;
      // ── ETAPA 1: texto nativo do PDF ──
      try{
        const typedarray=new Uint8Array(readerBin.result);
        pdfDoc=await pdfjsLib.getDocument({data:typedarray}).promise;
        for(let p=1;p<=pdfDoc.numPages;p++){
          const page=await pdfDoc.getPage(p);
          const tc=await page.getTextContent();
          fullText+=tc.items.map(it=>it.str).join(' ')+' ';
        }
        console.log('ETAPA 1 — texto extraído do PDF:',fullText);
      }catch(e){
        console.error('ETAPA 1 falhou (texto nativo):',e);
      }
      // ── ETAPA 2: valor a partir do texto (padrões explícitos + linha digitável, ambos dentro de parseValorTotalGenerico) ──
      let valor=0,venc=null;
      try{
        if(fullText && fullText.trim().length>=10){
          valor=parseValorTotalGenerico(fullText);
          venc=parseVencimentoGenerico(fullText);
        }
      }catch(e){
        console.error('ETAPA 2 falhou (parse do texto):',e);
      }
      if(valor>0){
        aplicarResultado(valor,venc,null);
        finalizarAnexo();
        return;
      }
      // ── ETAPA 3: OCR via canvas (PDF escaneado/sem camada de texto, ou etapas 1-2 não acharam nada) ──
      try{
        let canvas;
        if(pdfDoc){
          const page=await pdfDoc.getPage(1);
          const viewport=page.getViewport({scale:2.5});
          canvas=document.createElement('canvas');
          canvas.width=viewport.width;canvas.height=viewport.height;
          await page.render({canvasContext:canvas.getContext('2d'),viewport}).promise;
        } else {
          // Etapa 1 nem conseguiu abrir o PDF — tenta abrir de novo, isoladamente, só pra renderizar a página
          canvas=await pdfPrimeiraPaginaParaCanvas(new Uint8Array(readerBin.result));
        }
        await tentarOcrImagem(canvas);
      }catch(e){
        console.error('Erro na leitura do PDF:',e);
        statusEl.textContent='⚠️ Arquivo em formato de imagem/escaneado. Digite o valor manualmente.';
      }
      finalizarAnexo();
    };
    readerBin.readAsArrayBuffer(f);
  } else if(f.type.startsWith('image/')){
    const readerImg=new FileReader();
    readerImg.onload=async()=>{
      await tentarOcrImagem(readerImg.result);
      finalizarAnexo();
    };
    readerImg.onerror=()=>{
      statusEl.textContent='⚠ Não consegui ler esta imagem. Preencha manualmente abaixo.';
      finalizarAnexo();
    };
    readerImg.readAsDataURL(f);
  } else {
    statusEl.textContent='📎 Arquivo anexado — não dá pra ler o valor automaticamente deste tipo de arquivo. Preencha manualmente abaixo.';
    finalizarAnexo();
  }
}

function atualizarRateioPreview(){
  const total=+document.getElementById('rt-valor-total')?.value||0;
  const pcts=[...document.querySelectorAll('.rt-linha-pct')];
  let soma=0;
  pcts.forEach(inp=>{
    const idx=inp.dataset.idx;
    const pct=+inp.value||0;
    soma+=pct;
    const valorEl=document.querySelector(`.rt-linha-valor[data-idx="${idx}"]`);
    if(valorEl) valorEl.value=fmt(total*pct/100);
  });
  const ind=document.getElementById('rt-soma-indicador');
  if(ind){
    const ok=Math.abs(soma-100)<0.05;
    ind.textContent=`Soma dos percentuais: ${soma.toFixed(2)}%`+(ok?' ✓':' — precisa totalizar 100%');
    ind.style.color=ok?'var(--green)':'var(--red)';
  }
}
function confirmarRateio(){
  const total=+document.getElementById('rt-valor-total').value||0;
  if(total<=0){notify('Informe o valor total da conta','err');return;}
  const selects=[...document.querySelectorAll('.rt-linha-im')];
  const pcts=[...document.querySelectorAll('.rt-linha-pct')];
  const partes=selects.map((sel,i)=>({imovelId:sel.value,pct:+pcts[i].value||0})).filter(p=>p.imovelId && p.pct>0);
  if(!partes.length){notify('Selecione ao menos um imóvel e informe o percentual','err');return;}
  const soma=partes.reduce((s,p)=>s+p.pct,0);
  if(Math.abs(soma-100)>0.05){notify(`Os percentuais somam ${soma.toFixed(2)}% — precisa totalizar exatamente 100% para confirmar.`,'err');return;}
  const data=document.getElementById('rt-data').value;
  const tipoSel=document.getElementById('rt-tipo').value;
  const formaSel=document.getElementById('rt-forma').value;
  const statusSel=document.getElementById('rt-status').value;
  const obsSel=document.getElementById('rt-obs').value.trim();
  const base={id:uuid(),valor:total,data,partes,tipo:tipoSel,formaPagamento:formaSel,status:statusSel,obs:obsSel,comprovantes:_rateioPendingFile?[_rateioPendingFile]:[]};
  const lst=load(pkPeriodo('rateio_lanc'));
  lst.push(base);
  save(pkPeriodo('rateio_lanc'),lst);
  // gera automaticamente uma despesa direta por imóvel, com a cota calculada
  const desp=load(pkPeriodo('despesas'));
  calcularCotasAjustadas(total,partes).forEach(c=>{
    if(c.cota>0){
      desp.push({id:uuid(),imovelId:c.imovelId,desc:`Conta rateada (${c.pct}%)`,valor:c.cota,forma:'Rateio',data,comprovantes:[],rateioLancId:base.id});
    }
  });
  save(pkPeriodo('despesas'),desp);
  // gera também um lançamento em "Contas" (repasses) por imóvel, vinculado ao rateio
  const rep=load(pkPeriodo('repasses'));
  calcularCotasAjustadas(total,partes).forEach(c=>{
    if(c.cota>0){
      rep.push({id:uuid(),imovelId:c.imovelId,tipo:tipoSel,valor:c.cota,envio:data,formaPagamento:formaSel,status:statusSel,obs:obsSel,boleto:_rateioPendingFile||null,rateioLancId:base.id});
    }
  });
  save(pkPeriodo('repasses'),rep);
  document.getElementById('rt-file-input').value='';
  document.getElementById('rt-file-status').textContent='';
  _rateioPendingFile=null;
  notify('Rateio confirmado — lançado como despesa e em Contas para cada imóvel','ok');render();
}

function salvarEdicaoRateio(id){
  const lst=load(pkPeriodo('rateio_lanc'));
  const r=lst.find(x=>x.id===id);
  if(!r){notify('Rateio não encontrado','err');return;}
  const total=+document.getElementById('rt-valor-total').value||0;
  if(total<=0){notify('Informe o valor total da conta','err');return;}
  const selects=[...document.querySelectorAll('.rt-linha-im')];
  const pcts=[...document.querySelectorAll('.rt-linha-pct')];
  const partes=selects.map((sel,i)=>({imovelId:sel.value,pct:+pcts[i].value||0})).filter(p=>p.imovelId && p.pct>0);
  if(!partes.length){notify('Selecione ao menos um imóvel e informe o percentual','err');return;}
  const soma=partes.reduce((s,p)=>s+p.pct,0);
  if(Math.abs(soma-100)>0.05){notify(`Os percentuais somam ${soma.toFixed(2)}% — precisa totalizar exatamente 100% para confirmar.`,'err');return;}
  const data=document.getElementById('rt-data').value;
  const tipoSel=document.getElementById('rt-tipo').value;
  const formaSel=document.getElementById('rt-forma').value;
  const statusSel=document.getElementById('rt-status').value;
  const obsSel=document.getElementById('rt-obs').value.trim();
  r.valor=total;r.data=data;r.partes=partes;r.tipo=tipoSel;r.formaPagamento=formaSel;r.status=statusSel;r.obs=obsSel;
  if(_rateioPendingFile){
    if(!r.comprovantes)r.comprovantes=[];
    r.comprovantes.push(_rateioPendingFile);
  }
  save(pkPeriodo('rateio_lanc'),lst);
  // regenera despesas e lançamentos em Contas vinculados a este rateio, com os valores atualizados
  const desp=load(pkPeriodo('despesas')).filter(d=>d.rateioLancId!==id);
  calcularCotasAjustadas(total,partes).forEach(c=>{
    if(c.cota>0){
      desp.push({id:uuid(),imovelId:c.imovelId,desc:`Conta rateada (${c.pct}%)`,valor:c.cota,forma:'Rateio',data,comprovantes:[],rateioLancId:id});
    }
  });
  save(pkPeriodo('despesas'),desp);
  const rep=load(pkPeriodo('repasses')).filter(x=>x.rateioLancId!==id);
  calcularCotasAjustadas(total,partes).forEach(c=>{
    if(c.cota>0){
      rep.push({id:uuid(),imovelId:c.imovelId,tipo:tipoSel,valor:c.cota,envio:data,formaPagamento:formaSel,status:statusSel,obs:obsSel,boleto:(r.comprovantes&&r.comprovantes.length)?r.comprovantes[r.comprovantes.length-1]:null,rateioLancId:id});
    }
  });
  save(pkPeriodo('repasses'),rep);
  ST.rateioEditandoId=null;
  document.getElementById('rt-file-input').value='';
  document.getElementById('rt-file-status').textContent='';
  _rateioPendingFile=null;
  notify('Rateio atualizado — despesas e lançamentos em Contas foram recalculados','ok');render();
}

// ── CÁLCULO CONSOLIDADO DO MÊS ──
function calcMes(imovelIdFiltro){
  let ims=imoveisOrdenados();
  if(imovelIdFiltro) ims=ims.filter(i=>i.id===imovelIdFiltro);
  const alug=load(pkPeriodo('alugueis'));
  const desp=load(pkPeriodo('despesas'));
  const cond=load(pkPeriodo('condominio'));
  const transf=load(pkPeriodo('transferencias'));
  const rep=load(pkPeriodo('repasses'));
  const porImovel=ims.map(im=>{
    const liquido=alug.filter(r=>r.imovelId===im.id).reduce((s,r)=>s+(+r.liquido||0),0);
    const despesas=desp.filter(r=>r.imovelId===im.id).reduce((s,r)=>s+(+r.valor||0),0);
    const condPend=cond.filter(r=>r.imovelId===im.id && !r.devolvido).reduce((s,r)=>s+(+r.valor||0),0);
    const iptuAPagar=rep.filter(r=>r.imovelId===im.id && r.status==='recebido_a_pagar').reduce((s,r)=>s+(+r.valor||0),0);
    // Nota: o valor de IPTU repassado ao proprietário (recebido_a_pagar) NÃO entra no líquido
    // acima nem é descontado aqui — ele nunca foi contado como renda, então fica só como
    // alerta informativo (dinheiro que está na conta mas é reservado para o IPTU).
    const saldo=liquido-despesas-condPend;
    return {imovel:im,liquido,despesas,condPend,iptuAPagar,saldo};
  });
  const totalLiquido=porImovel.reduce((s,p)=>s+p.liquido,0);
  const totalDespesas=porImovel.reduce((s,p)=>s+p.despesas,0);
  const totalCondPend=porImovel.reduce((s,p)=>s+p.condPend,0);
  const totalIptuAPagar=porImovel.reduce((s,p)=>s+p.iptuAPagar,0);
  const totalSaldo=porImovel.reduce((s,p)=>s+p.saldo,0);
  const totalTransf=transf.reduce((s,r)=>s+(+r.valor||0),0);
  return {porImovel,totalLiquido,totalDespesas,totalCondPend,totalIptuAPagar,totalSaldo,totalTransf,disponivelAposPessoal:totalSaldo-totalTransf};
}

// ── DASHBOARD ──
function renderDash(){
  const c=calcMes();
  const modulos=montarModulos();
  const repassesMes=load(pkPeriodo('repasses'));
  const despesasContasPorImovel=(imovelId)=>repassesMes.filter(r=>r.imovelId===imovelId && r.status==='pago').reduce((s,r)=>s+(+r.valor||0),0);
  const linhasCalc=c.porImovel.map(p=>{
    const despesasContas=despesasContasPorImovel(p.imovel.id);
    return {imovel:p.imovel,liquido:p.liquido,despesas:despesasContas,saldo:p.liquido-despesasContas};
  });
  const totalDespesasPagas=linhasCalc.reduce((s,p)=>s+p.despesas,0);
  const totalSaldoImoveis=linhasCalc.reduce((s,p)=>s+p.saldo,0);
  const disponivelAposPessoalNovo=totalSaldoImoveis-c.totalTransf;
  const blocoModulo=(mod)=>{
    const idsDoModulo=mod.imoveis.map(i=>i.id);
    const linhas=linhasCalc.filter(p=>idsDoModulo.includes(p.imovel.id));
    const sub={liquido:0,despesas:0,saldo:0};
    linhas.forEach(p=>{sub.liquido+=p.liquido;sub.despesas+=p.despesas;sub.saldo+=p.saldo;});
    return `
    <div class="form-card" style="margin-bottom:16px">
      <div class="sec-hdr"><h2>🏠 ${mod.titulo}</h2><div class="sec-line"></div></div>
      ${!mod.imoveis.length?`<div class="sec-note" style="margin:0">Nenhum imóvel cadastrado neste grupo ainda. Assim que cadastrar um imóvel com esse nome, ele entra aqui automaticamente.</div>`:`
      <div class="tbl-wrap" style="margin-bottom:0"><table style="table-layout:fixed;width:100%">
        <colgroup><col style="width:40%"><col style="width:20%"><col style="width:20%"><col style="width:20%"></colgroup>
        <thead><tr><th style="text-align:left">Imóvel</th><th style="text-align:right">Líquido</th><th style="text-align:right">Despesas</th><th style="text-align:right">Saldo</th></tr></thead>
        <tbody>
          ${linhas.length?linhas.map(p=>`<tr><td style="text-align:left">${p.imovel.nome}</td><td class="pos" style="text-align:right">${fmt(p.liquido)}</td><td class="neg" style="text-align:right">${fmt(p.despesas)}</td><td class="${vc(p.saldo)}" style="text-align:right"><strong>${fmt(p.saldo)}</strong></td></tr>`).join(''):`<tr><td colspan="4"><div class="empty">Nenhum lançamento neste mês para este grupo.</div></td></tr>`}
        </tbody>
        <tfoot><tr class="tfoot"><td style="text-align:left">Subtotal — ${mod.titulo}</td><td class="pos" style="text-align:right">${fmt(sub.liquido)}</td><td class="neg" style="text-align:right">${fmt(sub.despesas)}</td><td class="${vc(sub.saldo)}" style="text-align:right">${fmt(sub.saldo)}</td></tr></tfoot>
      </table></div>`}
    </div>`;
  };
  return `
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-accent" style="background:var(--gold)"></div><div class="kpi-label">Líquido Recebido</div><div class="kpi-value pos">${fmt(c.totalLiquido)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--red)"></div><div class="kpi-label">Despesas do Mês (Pago)</div><div class="kpi-value neg">${fmt(totalDespesasPagas)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--amber)"></div><div class="kpi-label">Condomínio Pendente</div><div class="kpi-value" style="color:var(--amber)">${fmt(c.totalCondPend)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--red)"></div><div class="kpi-label">IPTU Recebido a Pagar</div><div class="kpi-value" style="color:var(--red)">${fmt(c.totalIptuAPagar)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--blue)"></div><div class="kpi-label">Saldo Imóveis</div><div class="kpi-value ${vc(totalSaldoImoveis)}">${fmt(totalSaldoImoveis)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--dim)"></div><div class="kpi-label">Transferido p/ Pessoal</div><div class="kpi-value neg">${fmt(c.totalTransf)}</div></div>
    <div class="kpi"><div class="kpi-accent" style="background:var(--green)"></div><div class="kpi-label">Disponível Após Pessoal</div><div class="kpi-value ${vc(disponivelAposPessoalNovo)}">${fmt(disponivelAposPessoalNovo)}</div></div>
  </div>
  <div class="sec-hdr"><h2>Saldo por Imóvel</h2><div class="sec-line"></div></div>
  <div class="sec-note" style="margin-top:-10px">Despesas aqui = soma dos lançamentos <strong>já pagos</strong> (status Pago) da aba Contas de cada imóvel neste mês. Contas "A Pagar", "A Vencer" ou "Vencida" não entram, porque ainda não saíram do seu caixa. Saldo = Líquido − Despesas Pagas.</div>
  ${modulos.map(blocoModulo).join('')}
  <div class="form-card" style="border-color:var(--gold-dim);background:var(--gold-bg)">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em">Total Geral — Todos os Imóveis</span>
      <span style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800" class="${vc(totalSaldoImoveis)}">${fmt(totalSaldoImoveis)}</span>
    </div>
  </div>`;
}

// ── DRE ──
function renderDRE(){
  const ims=imoveisOrdenados();
  const filtro=ST.dreImovelId||'';
  const c=calcMes(filtro||undefined);
  const row=(l,v,cls)=>`<div class="dre-row"><div class="dre-l">${l}</div><div class="dre-v ${cls||''}">${fmt(v)}</div></div>`;
  const nomeImovel=filtro?imovelNome(filtro):null;
  return `
  <div class="form-card" style="padding:14px 18px;margin-bottom:20px">
    <div class="fl"><label>Ver resultado de</label><select class="fi" id="dre-filtro-im" onchange="ST.dreImovelId=this.value;render()" style="max-width:320px">
      <option value=""${!filtro?' selected':''}>Todos os Imóveis (consolidado)</option>
      ${ims.map(i=>`<option value="${i.id}"${filtro===i.id?' selected':''}>${i.nome}</option>`).join('')}
    </select></div>
  </div>
  <div class="dre-hdr"><div class="dre-row"><div class="dre-l">Faturamento${nomeImovel?' — '+nomeImovel:''}</div></div></div>
  ${row('Aluguéis (líquido recebido)',c.totalLiquido,'pos')}
  <div class="dre-sub"><div class="dre-row"><div class="dre-l">Total Entradas</div><div class="dre-v pos">${fmt(c.totalLiquido)}</div></div></div>
  <div class="dre-hdr"><div class="dre-row"><div class="dre-l">Despesas</div></div></div>
  ${row('Despesas diretas (manutenção etc.)',c.totalDespesas,'neg')}
  ${row('Condomínio pendente de devolução',c.totalCondPend,'neg')}
  <div class="dre-sub"><div class="dre-row"><div class="dre-l">Total Despesas</div><div class="dre-v neg">${fmt(c.totalDespesas+c.totalCondPend)}</div></div></div>
  <div class="dre-hdr"><div class="dre-row"><div class="dre-l">Resultado</div></div></div>
  ${row(filtro?`Lucro/Prejuízo — ${nomeImovel}`:'Saldo Imóveis do Mês',c.totalSaldo,vc(c.totalSaldo))}
  ${filtro?'':row('(–) Transferido para Pessoal',c.totalTransf,'neg')}
  ${filtro?'':`<div class="dre-sub"><div class="dre-row"><div class="dre-l">Disponível Após Pessoal</div><div class="dre-v ${vc(c.disponivelAposPessoal)}">${fmt(c.disponivelAposPessoal)}</div></div></div>`}
  ${filtro?`<div class="sec-note" style="margin-top:8px">A transferência para Pessoal é um controle geral, não por imóvel — por isso não aparece neste recorte. Veja o consolidado em "Todos os Imóveis" para esse número.</div>`:''}
  ${c.totalIptuAPagar>0?`<div class="sec-note" style="margin-top:20px;color:var(--red)">⚠ Existe ${fmt(c.totalIptuAPagar)} de IPTU que a imobiliária repassou pra você (não descontou) e ainda não foi pago. Esse valor está fisicamente na sua conta mas não é seu — separe-o antes de mexer no saldo abaixo. Acompanhe em "Contas".</div>`:''}
  <div class="sec-note" style="margin-top:12px">IPTU e água descontados diretamente pela imobiliária não entram neste DRE porque nunca chegaram a compor o valor líquido recebido — evita contar a mesma despesa duas vezes. Ficam registrados na aba "Contas" só para conferência e comprovação.</div>
  `;
}

// ── NAVEGAÇÃO ──
const TITLES={dashboard:'Dashboard',alugueis:'Aluguéis',repasses:'Contas',despesas:'Despesas Diretas',condominio:'Condomínio Adiantado',rateio:'Contas Rateadas',imoveis:'Cadastro de Imóveis',pessoal:'Transferência para Pessoal',dre:'DRE — Resultado do Mês'};
function setTab(tab,btn){
  ST.tab=tab;
  document.querySelectorAll('.sb-item[data-tab]').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}
function render(){
  document.getElementById('tb-title').textContent=TITLES[ST.tab]||'';
  const fns={dashboard:renderDash,alugueis:renderAlugueis,repasses:renderRepasses,despesas:renderDespesas,condominio:renderCondominio,rateio:renderRateio,imoveis:renderImoveis,pessoal:renderPessoal,dre:renderDRE};
  try{
    document.getElementById('content').innerHTML=(fns[ST.tab]||(()=>''))();
    if(ST.tab==='rateio'){
      if(ST.rateioEditandoId){
        const r=load(pkPeriodo('rateio_lanc')).find(x=>x.id===ST.rateioEditandoId);
        if(r && r.partes && r.partes.length){
          renderRateioLinhas(r.partes.length);
          setTimeout(()=>{
            const selects=[...document.querySelectorAll('.rt-linha-im')];
            const pcts=[...document.querySelectorAll('.rt-linha-pct')];
            r.partes.forEach((p,i)=>{if(selects[i])selects[i].value=p.imovelId;if(pcts[i])pcts[i].value=p.pct;});
            atualizarRateioPreview();
          },0);
        } else {
          renderRateioLinhas(ST.rateioQtd||3);
        }
      } else {
        renderRateioLinhas(ST.rateioQtd||3);
      }
    }
  }catch(e){
    console.error('Erro ao renderizar a aba',ST.tab,e);
    document.getElementById('content').innerHTML=`<div class="form-card" style="border-color:var(--red)">
      <div class="sec-hdr"><h2 style="color:var(--red)">Ops, algo deu errado nesta tela</h2><div class="sec-line"></div></div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px">Detalhe técnico: ${(e.message||'').replace(/</g,'&lt;')}</p>
      <button class="btn-ghost" onclick="setTab('dashboard',null)">Voltar ao Dashboard</button>
    </div>`;
  }
}
function changePeriod(){
  ST.mes=Number(document.getElementById('sel-mes').value);
  ST.ano=Number(document.getElementById('sel-ano').value);
  syncFromFB().then(render).catch(render);
}

function initApp(){
  const ms=document.getElementById('sel-mes'),ys=document.getElementById('sel-ano');
  ms.innerHTML=MESES.map((m,i)=>`<option value="${i+1}"${i+1===ST.mes?' selected':''}>${m}</option>`).join('');
  const y=ST.ano;
  ys.innerHTML=[y-1,y,y+1].map(v=>`<option value="${v}"${v===y?' selected':''}>${v}</option>`).join('');
  syncFromFB().then(render).catch(render);
}

// ── TEMA CLARO / ESCURO ──
function aplicarTema(tema){
  document.body.classList.toggle('dark-mode',tema==='dark');
  const label=document.getElementById('theme-toggle-label');
  if(label)label.textContent=tema==='dark'?'🛡️ Brightness':'⚔️ Darkness';
}
function alternarTema(){
  const atual=localStorage.getItem('imoveisfg_theme')==='dark'?'dark':'light';
  const novo=atual==='dark'?'light':'dark';
  localStorage.setItem('imoveisfg_theme',novo);
  aplicarTema(novo);
}
aplicarTema(localStorage.getItem('imoveisfg_theme')==='dark'?'dark':'light');

// ── BOOT ──
if(sessionStorage.getItem('imoveisfg_auth')==='1'){
  document.getElementById('login-screen').style.display='none';
  initApp();
} else {
  document.getElementById('login-screen').style.display='flex';
}
</script>
</body>
